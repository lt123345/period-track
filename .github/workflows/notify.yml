name: Period Reminder
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *" # UTC 8:00 = Beijing 16:00

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and notify
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: ./scripts/notify.sh
